# ==========================================
# 사이트 기본 설정
# ==========================================
locale: "ko-KR"
title: "유혜린" # TODO: 이름/사이트 제목으로 수정
title_separator: "-"
name: "유혜린" # TODO
description: "비전, 목표, 전략, 그리고 만들어온 것들을 기록하는 개인 홈페이지입니다." # TODO
url: "https://hye343.github.io"
repository: "hye343/hye343.github.io"
logo: # 예: "/assets/images/logo.png"

# ==========================================
# 테마 (minimal-mistakes) - GitHub Pages에서 remote_theme으로 자동 빌드됨
# ==========================================
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "default" # 다른 스킨: air, aqua, contrast, dark, dirt, neon, mint, plum, sunrise

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-include-cache

# ==========================================
# 작성자 정보 (사이드바에 표시됨)
# ==========================================
author:
  name: "유혜린" # TODO
  avatar: "/assets/images/profile.jpg" # TODO: 사진 파일을 assets/images/ 에 넣고 파일명 맞추기
  bio: "한 줄 소개를 여기에 적어주세요." # TODO
  location: "대한민국" # TODO
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:example@email.com" # TODO
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/hye343"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/example" # TODO: 없으면 이 항목 삭제

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/hye343"

# ==========================================
# 기본 레이아웃 설정
# ==========================================
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
      read_time: false
      comments: false
      share: false
      related: false
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true

# ==========================================
# 컬렉션 (포트폴리오 항목을 하나씩 관리하고 싶을 때 사용)
# ==========================================
collections:
  portfolio:
    output: true
    permalink: /:collection/:path/

# ==========================================
# 빌드 설정
# ==========================================
markdown: kramdown
highlighter: rouge
include: ["_pages"]
words_per_minute: 200

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
